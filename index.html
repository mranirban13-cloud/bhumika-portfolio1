<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BHUMIKA CHAUDHARY | Digital Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root { --accent: #d4af77; }
        .accent { color: var(--accent); }
        .accent-bg { background-color: var(--accent); }
        .hero-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -2; }
        
        /* Creator credit badge */
        .creator-badge {
            position: fixed;
            bottom: 16px;
            right: 16px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.4);
            transition: all 0.3s ease;
            z-index: 999;
        }
        .creator-badge:hover {
            color: rgba(255,255,255,0.8);
        }
        .creator-badge a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .creator-badge a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body class="bg-black text-white font-sans">

<div id="app">
    <!-- Content loads here -->
</div>

<script>
// ==================== SUPABASE CONFIG (REPLACE THESE) ====================
const SUPABASE_URL = 'https://YOUR-PROJECT.supabase.co';
const SUPABASE_ANON = 'eyJ...';
// =====================================================================

async function fetchData(table) {
    const res = await fetch(`\( {SUPABASE_URL}/rest/v1/ \){table}?select=*`, {
        headers: { 
            apikey: SUPABASE_ANON, 
            Authorization: `Bearer ${SUPABASE_ANON}` 
        }
    });
    return await res.json();
}

async function loadWebsite() {
    const settings = (await fetchData('site_settings'))[0] || {};
    const galleryData = await fetchData('gallery');

    document.documentElement.style.setProperty('--accent', settings.accent_color || '#d4af77');

    document.getElementById('app').innerHTML = `
        <!-- NAVBAR -->
        <nav class="fixed top-0 left-0 right-0 z-50 bg-black/70 backdrop-blur-md border-b border-white/10">
            <div class="max-w-7xl mx-auto px-6 py-5 flex justify-between items-center">
                <h1 class="text-2xl font-bold accent">BHUMIKA</h1>
                <div class="space-x-8">
                    <a href="#about" class="hover:accent transition">About</a>
                    <a href="#gallery" class="hover:accent transition">Gallery</a>
                    <a href="#collaborate" class="hover:accent transition">Collaborate</a>
                </div>
            </div>
        </nav>

        <!-- HERO -->
        <header class="hero relative h-screen flex items-center justify-center overflow-hidden">
            <video class="hero-video" autoplay muted loop playsinline src="${settings.hero_video_url || '6.mp4'}"></video>
            <div class="hero-overlay absolute inset-0 bg-black/60"></div>
            <div class="relative text-center px-6">
                <h1 class="text-6xl md:text-8xl font-bold heading-font mb-4">${settings.hero_title || 'BHUMIKA CHAUDHARY'}</h1>
                <p class="text-xl md:text-3xl opacity-90">${settings.hero_subtitle || 'Just a girl chasing dreams ✨'}</p>
            </div>
        </header>

        <!-- ABOUT -->
        <section id="about" class="py-28 px-6 max-w-4xl mx-auto">
            <p class="text-lg md:text-xl leading-relaxed text-center opacity-90">
                ${settings.about_text || 'Your beautiful about text goes here...'}
            </p>
        </section>

        <!-- GALLERY -->
        <section id="gallery" class="py-28 px-6 bg-zinc-950">
            <h2 class="text-5xl md:text-6xl heading-font text-center mb-16">Digital Gallery</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto" id="galleryGrid"></div>
        </section>

        <!-- COLLABORATE -->
        <section id="collaborate" class="py-28 px-6">
            <div class="max-w-xl mx-auto text-center">
                <h2 class="text-5xl heading-font mb-10">Let's Create Together</h2>
                <form id="collabForm" class="space-y-6">
                    <input type="text" placeholder="Your Name" required class="w-full p-5 bg-zinc-900 border border-zinc-700 rounded-2xl focus:outline-none focus:border-[var(--accent)]">
                    <input type="email" placeholder="Email Address" required class="w-full p-5 bg-zinc-900 border border-zinc-700 rounded-2xl focus:outline-none focus:border-[var(--accent)]">
                    <textarea placeholder="Your message / collaboration idea..." rows="5" required class="w-full p-5 bg-zinc-900 border border-zinc-700 rounded-2xl focus:outline-none focus:border-[var(--accent)]"></textarea>
                    <button type="submit" class="accent-bg w-full py-6 rounded-full text-lg font-semibold hover:opacity-90 transition">SEND REQUEST</button>
                </form>
            </div>
        </section>

        <!-- FOOTER with credit -->
        <footer class="py-16 px-6 text-center border-t border-zinc-800">
            <p class="text-zinc-500 mb-2">© ${new Date().getFullYear()} Bhumika Chaudhary</p>
            <p class="text-sm text-zinc-600">
                Designed & Developed with ♡ by 
                <a href="https://www.instagram.com/anixmyst" target="_blank" class="accent hover:underline">
                    Anirban (@anixmyst)
                </a>
            </p>
        </footer>

        <!-- Floating subtle credit badge -->
        <div class="creator-badge">
            Crafted by <a href="https://www.instagram.com/anixmyst?igsh=bXBlMHBtZ3lhN2p5" target="_blank">@anixmyst</a>
        </div>
    `;

    // Populate gallery
    const grid = document.getElementById('galleryGrid');
    galleryData
        .sort((a,b) => (a.sort_order || 0) - (b.sort_order || 0))
        .forEach(img => {
            const div = document.createElement('div');
            div.innerHTML = `
                <img src="${img.image_url}" alt="Gallery image" class="w-full h-auto aspect-square object-cover rounded-3xl hover:scale-[1.03] transition duration-500">
            `;
            grid.appendChild(div);
        });

    // Form submission (placeholder)
    document.getElementById('collabForm')?.addEventListener('submit', async e => {
        e.preventDefault();
        alert('Thank you! Your request has been sent 💌');
        // Here you would normally POST to Supabase 'messages' table
    });
}

window.onload = loadWebsite;
</script>
</body>
</html>
